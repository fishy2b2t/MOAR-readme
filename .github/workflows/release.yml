name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      # 26.1.1 excluded — requires JDK 25 (not yet available on GitHub-hosted runners)
      - name: Clean & build stable versions
        run: >
          ./gradlew clean
          :1.21.4:buildAndCollect
          :1.21.5:buildAndCollect
          :1.21.8:buildAndCollect
          :1.21.10:buildAndCollect
          :1.21.11:buildAndCollect
          --no-daemon

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep '^mod\.version=' gradle.properties | cut -d= -f2)
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release ZIPs
        id: package
        run: |
          VER="${{ steps.version.outputs.version }}"
          STAGING="build/release"
          mkdir -p "$STAGING"

          HASH_BODY=""

          for mc in 1.21.4 1.21.5 1.21.8 1.21.10 1.21.11; do
            JAR="build/libs/${VER}/moar-${VER}+${mc}.jar"
            if [ ! -f "$JAR" ]; then
              echo "::error::Missing JAR: $JAR"
              exit 1
            fi

            HASH=$(sha256sum "$JAR" | awk '{print $1}')
            JAR_NAME="moar-${VER}+${mc}.jar"
            ZIP_NAME="moar-${VER}+${mc}.zip"

            # Create checksum file for inside the ZIP
            echo "${HASH}  ${JAR_NAME}" > "${STAGING}/SHA256SUMS.txt"

            # Build the ZIP (jar + checksum)
            (cd "build/libs/${VER}" && zip -j "../../release/${ZIP_NAME}" "$JAR_NAME")
            (cd "$STAGING" && zip "${ZIP_NAME}" SHA256SUMS.txt)
            rm "${STAGING}/SHA256SUMS.txt"

            HASH_BODY="${HASH_BODY}| ${mc} | \`${JAR_NAME}\` | \`${HASH}\` |"$'\n'
          done

          # Sources JAR (not zipped, included directly)
          SOURCES_JAR=$(find "build/libs/${VER}" -name "moar-*-sources.jar" | head -1)
          if [ -n "$SOURCES_JAR" ]; then
            cp "$SOURCES_JAR" "$STAGING/"
          fi

          # Write hash table for release body
          {
            echo "hashes<<EOF"
            echo "$HASH_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"
          ls -la "$STAGING/"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG".."$GITHUB_REF_NAME" -- \
              ':!*.md' ':!.github' 2>/dev/null || echo "- Initial release")
          else
            CHANGES="- Initial release"
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release artifact paths
        id: artifacts
        run: |
          VER="${{ steps.version.outputs.version }}"
          jar_dir="build/libs/${VER}"
          jar_path="${jar_dir}/*.jar"
          sbom_path="build/release/moar-${VER}.spdx.json"
          echo "jar_dir=${jar_dir}" >> "$GITHUB_OUTPUT"
          echo "jar_path=${jar_path}" >> "$GITHUB_OUTPUT"
          echo "sbom_path=${sbom_path}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ steps.artifacts.outputs.jar_dir }}
          format: spdx-json
          output-file: ${{ steps.artifacts.outputs.sbom_path }}
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SHA-256 checksums
        run: |
          VER="${{ steps.version.outputs.version }}"
          mkdir -p build/release
          for jar in build/libs/${VER}/*.jar; do
            [ -f "$jar" ] || continue
            out="build/release/$(basename "$jar").sha256"
            sha256sum "$jar" > "$out"
            echo "Generated checksum for $(basename "$jar")"
            cat "$out"
          done

      - name: Attest release artifacts provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifacts.outputs.jar_path }}

      - name: Attest release artifact SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifacts.outputs.jar_path }}
          sbom-path: ${{ steps.artifacts.outputs.sbom_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MOAR v${{ steps.version.outputs.version }}
          body: |
            ## MOAR v${{ steps.version.outputs.version }}

            ### Downloads
            Each ZIP contains the mod JAR and a `SHA256SUMS.txt` verification file.

            | Minecraft | File | SHA-256 |
            |-----------|------|---------|
            ${{ steps.package.outputs.hashes }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}
          files: |
            ${{ steps.package.outputs.staging }}/moar-*.zip
            ${{ steps.package.outputs.staging }}/moar-*-sources.jar
            ${{ steps.package.outputs.staging }}/*.sha256
            ${{ steps.artifacts.outputs.sbom_path }}
          fail_on_unmatched_files: true
          generate_release_notes: false
